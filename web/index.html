<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Egypt Post Cisco directory for searching Cisco numbers by name, place, or department.">
  <meta name="theme-color" content="#07965F">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Egypt Post Cisco">

  <link rel="icon" type="image/png" href="favicon.png?v=12">
  <link rel="apple-touch-icon" href="icons/Icon-192.png?v=12">
  <link rel="manifest" href="manifest.json?v=12">

  <title>Egypt Post Cisco</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #07965F;
      overflow: hidden;
      font-family: Tahoma, Arial, sans-serif;
    }

    #native-loader {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #07965F 0%, #006B48 55%, #003D2A 100%);
      color: white;
      transition: opacity 350ms ease, visibility 350ms ease;
    }

    #native-loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-card {
      width: min(88vw, 460px);
      padding: 34px 24px;
      border-radius: 34px;
      text-align: center;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(14px);
      box-sizing: border-box;
    }

    .loader-logo {
      width: 118px;
      height: 118px;
      margin: 0 auto 22px;
      border-radius: 999px;
      background: white;
      padding: 8px;
      box-sizing: border-box;
      object-fit: cover;
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.22);
    }

    .loader-title {
      margin: 0;
      font-size: 31px;
      font-weight: 900;
      direction: ltr;
    }

    .loader-subtitle {
      margin: 10px 0 0;
      font-size: 17px;
      font-weight: 700;
      opacity: 0.9;
    }

    .loader-gift {
      margin-top: 24px;
      line-height: 1.8;
      font-size: 16px;
      font-weight: 800;
      opacity: 0.95;
    }

    .spinner {
      width: 38px;
      height: 38px;
      margin: 26px auto 0;
      border-radius: 50%;
      border: 4px solid rgba(255, 255, 255, 0.28);
      border-top-color: white;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loader-footer {
      margin-top: 22px;
      font-size: 12px;
      opacity: 0.7;
      direction: ltr;
    }
  </style>
</head>

<body>
  <div id="native-loader">
    <div class="loader-card">
      <img class="loader-logo" src="icons/Icon-192.png?v=12" alt="Egypt Post Logo">
      <h1 class="loader-title">Egypt Post Cisco</h1>
      <p class="loader-subtitle">دليل أرقام السيسكو للبريد المصري</p>

      <div class="loader-gift">
        اهداء من إدارة التكنولوجيا والمعلومات<br>
        بمنطقة برج العرب<br>
        إلى جميع موظفي البريد المصري<br><br>
        تنفيذ : م/ احمد نابغ موسي
      </div>

      <div class="spinner"></div>
      <div class="loader-footer">Powered by Egypt Post Technology &amp; Information</div>
    </div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('native-loader');
      if (loader) {
        loader.classList.add('hidden');
        setTimeout(function () { loader.remove(); }, 500);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
