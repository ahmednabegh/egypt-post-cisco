name: egypt_post_cisco
description: Egypt Post Cisco directory search app built from the provided Excel sheet.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  qr_flutter: ^4.1.0
  share_plus: ^12.0.2
  shared_preferences: ^2.5.3
  speech_to_text: ^7.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/data/cisco_directory.json
    - assets/images/egypt_post_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon.png
  adaptive_icon_background: '#07965F'
  adaptive_icon_foreground: assets/icons/app_icon.png
  remove_alpha_ios: true
